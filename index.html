<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        #dice {
            font-size: 80px;
            margin: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🎲 Dice Roller</h1>

    <div id="dice">⚀</div>

    <button onclick="rollDice()">Roll Dice</button>

    <script>
        function rollDice() {
            const diceFaces = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
            const roll = Math.floor(Math.random() * 6);
            document.getElementById("dice").textContent = diceFaces[roll];
        }
    </script>

</body>
</html>
